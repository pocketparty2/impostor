<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Impostor!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Impostor!</h1>

  <!-- Setup Screen -->
  <section id="setup">
    <h2>Game Setup</h2>

    <label>
      Player names (comma separated):
      <input type="text" id="playerNames" placeholder="Alice,Bob,Charlie" />
    </label>

    <h3>Select Categories:</h3>
    <div id="categoryList"></div>

    <button id="startGameBtn">Start Game</button>
  </section>

  <!-- Reveal Screen (one player at a time) -->
  <section id="reveal" class="hidden">
    <h2 id="revealPlayerName"></h2>

    <div id="revealCard" class="reveal-card">
      <p id="revealText">Hold to reveal</p>
    </div>

    <button id="nextPlayerBtn" class="hidden">Next Player</button>
  </section>

  <!-- Discussion Screen -->
  <section id="discussion" class="hidden">
    <h2>Game Started!</h2>
    <p id="discussionStarter"></p>
    <button id="revealResultsBtn">Reveal Impostor & Word</button>
  </section>

  <!-- Results Screen -->
  <section id="results" class="hidden">
    <h2>Results</h2>
    <p id="finalWord"></p>
    <p id="finalImpostor"></p>
    <button id="playAgainBtn">Play Again</button>
  </section>

  <!-- Scripts -->
  <script src="words.js"></script>
  <script src="script.js"></script>

</body>
</html>
