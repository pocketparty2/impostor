<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Impostor!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Impostor!</h1>

  <!-- Setup Screen -->
  <section id="setup">
    <h2>Game Setup</h2>

    <label>
      Player names (comma separated):
      <input type="text" id="playerNames" placeholder="Alice,Bob,Charlie" />
    </label>

    <button id="startGameBtn">Start Game</button>
  </section>

  <!-- Game Screen -->
  <section id="game" class="hidden">
    <h2>Players</h2>
    <div id="playersContainer"></div>

    <p class="note">
      Each player clicks their card to reveal their word.  
      Everyone gets the same word except the impostor, who only sees a hint.
    </p>
  </section>

  <!-- Scripts -->
  <script src="words.js"></script>
  <script src="script.js"></script>

</body>
</html>
