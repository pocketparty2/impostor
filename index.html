<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile perfect scaling + no zoom -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Impostor!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Impostor!</h1>

  <!-- Setup Screen -->
  <section id="setup">
    <h2>Game Setup</h2>

    <div id="playerList"></div>

    <button id="addPlayerBtn" class="bottom-button">+ Add Player</button>

    <h3>Select Categories:</h3>
    <div id="categoryList"></div>

    <button id="startGameBtn">Start Game</button>
  </section>

  <!-- Reveal Screen -->
  <section id="reveal" class="hidden">
    <h2 id="revealPlayerName"></h2>

    <div id="revealCard" class="reveal-card">
      <div class="reveal-inner">
        <div class="reveal-front">
          Hold to reveal
        </div>
        <div class="reveal-back" id="revealBackText"></div>
      </div>
    </div>

    <button id="nextPlayerBtn">Next Player</button>
  </section>

  <!-- Discussion Screen -->
  <section id="discussion" class="hidden">
    <h2>Game Started!</h2>
    <p id="discussionStarter"></p>
    <button id="revealResultsBtn">Reveal Impostor & Word</button>
  </section>

  <!-- Results Screen -->
  <section id="results" class="hidden">
    <h2>Results</h2>
    <p id="finalWord"></p>
    <p id="finalImpostor"></p>
    <button id="playAgainBtn">Play Again</button>
  </section>

  <script src="words.js"></script>
  <script src="script.js"></script>

</body>
</html>
